version: '3.8'

services:
  # PostgreSQL - Relational Data (OLTP)
  postgres:
    image: postgres:15-alpine
    container_name: mf_postgres
    environment:
      POSTGRES_DB: mf_relational
      POSTGRES_USER: mf_user
      POSTGRES_PASSWORD: mf_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mf_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mf_user -d mf_relational"]
      interval: 10s
      timeout: 5s
      retries: 5

  # TimescaleDB - Time-Series Data (OLAP)
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: mf_timescaledb
    environment:
      POSTGRES_DB: mf_timeseries
      POSTGRES_USER: mf_user
      POSTGRES_PASSWORD: mf_password
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./scripts/init_timescaledb.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./setup_timescaledb_hypertables.sql:/docker-entrypoint-initdb.d/02-hypertables.sql
    networks:
      - mf_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mf_user -d mf_timeseries"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mf_backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_NAME: mf_relational
      POSTGRES_USER: mf_user
      POSTGRES_PASSWORD: mf_password
      TIMESCALEDB_HOST: timescaledb
      TIMESCALEDB_PORT: 5432
      TIMESCALEDB_NAME: mf_timeseries
      TIMESCALEDB_USER: mf_user
      TIMESCALEDB_PASSWORD: mf_password
      DEBUG: "true"
    volumes:
      - ./backend:/app/backend
      - ./analytics:/app/analytics
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - mf_network
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  # Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mf_frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
      API_KEY: ""
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - backend
    networks:
      - mf_network
    command: streamlit run frontend/streamlit_app/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data:
    driver: local
  timescaledb_data:
    driver: local

networks:
  mf_network:
    driver: bridge
